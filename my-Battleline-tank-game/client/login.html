<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tank Frontline — Login</title>
  <!-- theme.js FIRST: prevents flash of wrong theme -->
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="auth-page">

  <!-- Theme toggle -->
  <div class="auth-theme-btn">
    <button class="theme-toggle" aria-label="Toggle theme">
      <span class="icon-moon">🌙</span>
      <span class="icon-sun">☀️</span>
    </button>
  </div>

  <!-- Brand -->
  <div class="auth-brand">
    <span class="auth-logo">⬡ TANK FRONTLINE</span>
    <span class="auth-brand-sub">Armored Combat Simulator</span>
  </div>

  <!-- Card -->
  <div class="card auth-card">
    <div class="auth-card-header">
      <div class="auth-card-title">Welcome back</div>
      <div class="auth-card-sub">Sign in to your commander account</div>
    </div>

    <div class="alert alert-error" id="errorMsg">
      <span class="alert-icon">⚠</span>
      <span id="errorText"></span>
    </div>
    <div class="alert alert-success" id="successMsg">
      <span class="alert-icon">✓</span>
      <span id="successText"></span>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="commander@frontline.mil" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
    </div>

    <button class="btn btn-primary btn-block" id="loginBtn">Sign in</button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>initLoginPage();</script>
</body>
</html>
